<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}


html{

scroll-behavior:smooth;

}


body{

font-family:'Poppins',sans-serif;
background:#faf8f4;
color:#1c1c1c;
overflow-x:hidden;

}


h1,h2,h3{

font-family:'Cormorant Garamond',serif;

}


a{

text-decoration:none;

}


.container{

max-width:1300px;
margin:auto;

}


section{

padding:110px 8%;

}



/* NAVBAR */


nav{

position:fixed;
top:0;
left:0;
width:100%;
padding:28px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(250,248,244,.92);
backdrop-filter:blur(15px);
z-index:999;

}


.logo{

font-size:38px;
font-weight:700;
letter-spacing:1px;
color:#171717;

}


.logo span{

color:#b88a44;

}


.menu{

display:flex;
gap:40px;

}


.menu a{

font-size:15px;
color:#222;
font-weight:500;
letter-spacing:.5px;

}


.menu a:hover{

color:#b88a44;

}



/* HERO */


.hero{

height:100vh;

background:

linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.45)
),

url("https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?w=2000");


background-size:cover;

background-position:center;

display:flex;

align-items:center;

justify-content:center;

text-align:center;


}


.hero-content{

max-width:1000px;
color:white;

}


.hero h1{

font-size:90px;
line-height:1.05;
font-weight:600;

}


.hero p{

font-size:22px;
line-height:1.8;
margin-top:30px;
font-weight:300;

}


.hero-buttons{

margin-top:45px;
display:flex;
justify-content:center;
gap:25px;

}



.btn{

padding:18px 45px;
border-radius:50px;
font-size:15px;
font-weight:600;
transition:.4s;

}



.gold-btn{

background:#b88a44;
color:white;

}


.gold-btn:hover{

transform:translateY(-6px);

box-shadow:0 20px 40px rgba(0,0,0,.3);

}



.white-btn{

border:1px solid white;
color:white;

}


.white-btn:hover{

background:white;
color:#111;

}





@media(max-width:900px){


.menu{

display:none;

}


.hero h1{

font-size:52px;

}


.hero p{

font-size:18px;

}


}
