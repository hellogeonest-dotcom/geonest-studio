<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoNest Studio</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#333;
}
header{
background:#0f172a;
color:white;
padding:70px 20px;
text-align:center;
}
header h1{
font-size:48px;
margin:0;
}
header p{
font-size:20px;
margin-top:10px;
}
.btn{

margin-top:25px;
padding:14px 30px;
background:#d4af37;
color:white;
text-decoration:none;
border-radius:8px;
}
section{
max-width:1100px;
margin:auto;
padding:60px 20px;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
